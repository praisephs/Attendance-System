<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Attendance</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    h1 { margin-bottom: 10px; }
    p { color: #94a3b8; margin-bottom: 20px; }

    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .checkin { background: #22c55e; color: white; }
    .checkout { background: #ef4444; color: white; }
    button:hover { opacity: 0.85; }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #38bdf8;
    }

    #close-btn {
      background-color: #d32f2f;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      display: none; 
      margin-top: 20px;
    }

    #close-btn:active { transform: scale(0.95); }
  </style>
</head>

<body>

  <audio id="successSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

  <div class="container">
    <h1 id="greeting">Welcome</h1> 
    <p id="instruction">Tap below to record your time</p>

    <div id="button-group">
        <button class="checkin" onclick="sendAction('checkin')">✅ Check In</button>
        <button class="checkout" onclick="sendAction('checkout')">❌ Check Out</button>
    </div>

    <div class="status" id="status"></div>
    
    <button id="close-btn" onclick="closeSystem()">🔴 Close & Exit</button>
  </div>

<script>
    // 1. GLOBAL VARIABLES
    const urlParams = new URLSearchParams(window.location.search);
    const staffId = urlParams.get('staffId');
    const action = urlParams.get('action');
    const webhookBase = "https://uyipraise.app.n8n.cloud/webhook/attendance";

    // 2. PAGE LOAD LOGIC
    window.onload = function() {
        if (staffId) {
            fetch(`${webhookBase}?staffId=${staffId}&action=load`)
                .then(res => res.json())
                .then(data => {
                    if (data.display_name) {
                        document.getElementById("greeting").innerText = `Good day, ${data.display_name} 👋`;
                    }
                })
                .catch(err => console.log("Load error:", err));

            if (action === 'confirm') {
                document.getElementById("button-group").style.display = "none";
                document.getElementById("instruction").style.display = "none";
                document.getElementById("greeting").innerText = "Verification Mode";
                document.getElementById("status").innerText = "📍 Confirming your location...";

                navigator.geolocation.getCurrentPosition((position) => {
                    sendRequest('confirm', position.coords.latitude, position.coords.longitude);
                }, (error) => {
                    document.getElementById("status").innerText = "❌ Please enable GPS to verify.";
                });
            }
        } else {
            document.getElementById("greeting").innerText = "Welcome! (ID Missing)";
        }
    };

    // 3. MANUAL BUTTON TRIGGER
    function sendAction(actionType) {
        document.getElementById("successSound").load();
        document.getElementById("status").innerText = "Processing...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    sendRequest(actionType, position.coords.latitude, position.coords.longitude);
                },
                () => {
                    sendRequest(actionType, null, null);
                }
            );
        } else {
            sendRequest(actionType, null, null);
        }
    }

    // 4. THE MAIN REQUEST FUNCTION

     function sendRequest(actionType, lat, lon) {
    let url = `${webhookBase}?staffId=${staffId}&action=${actionType}`;
    if (lat && lon) url += `&lat=${lat}&lon=${lon}`;

    fetch(url)
        .then(response => response.json())
        .then((data) => {
            const statusElement = document.getElementById("status");
            const instructionElement = document.getElementById("instruction");
            const closeBtn = document.getElementById("close-btn");
            const buttonGroup = document.getElementById("button-group");

            // Put the n8n message into the status box
            statusElement.innerText = data.message;

            // --- DEFINE THE STATUS TYPES ---
            // A duplicate is identified by the warning emoji or specific text
            const isDuplicateOrMissing = data.message.includes("already") || data.message.includes("⚠️") || data.message.includes("no check-in was found");
            const isError = data.message.includes("Error") || data.message.includes("NOT AT WORKSTATION") || data.message.includes("❌");
            const isActuallySuccess = !isDuplicateOrMissing && !isError;

            if (isActuallySuccess) {
                // REAL SUCCESS LOGIC
                instructionElement.innerText = actionType === 'checkout' ? "Shift Ended. Have a great day!" : "Location Confirmed";
                statusElement.style.color = "#4BB543"; // Success Green
                statusElement.style.background = "transparent";
                statusElement.style.padding = "0px";
                
                if (closeBtn) closeBtn.style.display = "inline-block";
                if (buttonGroup) buttonGroup.style.display = "none";

            } else if (isDuplicateOrMissing) {
                // WARNING LOGIC (Duplicate Check-in/Out OR Missing Check-in)
                if (data.message.includes("no check-in was found")) {
                    instructionElement.innerText = "Missing Record";
                } else {
                    instructionElement.innerText = "Entry Already Exists";
                }

                statusElement.style.color = "#ffffff"; 
                statusElement.style.background = "#f59e0b"; // Amber/Orange Background
                statusElement.style.padding = "15px";
                statusElement.style.borderRadius = "10px";
                statusElement.style.fontWeight = "bold";

                if (closeBtn) closeBtn.style.display = "inline-block";
                if (buttonGroup) buttonGroup.style.display = "none";

            } else {
                // ERROR / OUT OF WORKSTATION LOGIC
                instructionElement.innerText = "Location Check Failed";
                statusElement.style.color = "#ffffff"; 
                statusElement.style.background = "#ef4444"; // Bright Red Background
                statusElement.style.padding = "15px";
                statusElement.style.borderRadius = "10px";
                statusElement.style.fontWeight = "bold";
                
                // Shake the phone for an error
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
            }
        })
        .catch((err) => {
            document.getElementById("status").innerText = "❌ Connection Error. Try again.";
            document.getElementById("status").style.color = "#ff4d4d";
            document.getElementById("status").style.background = "transparent";
        });
} 
  
    // 5. THE NEW CLOSE FUNCTION
    function closeSystem() {
        window.close();
        setTimeout(() => {
            window.location.href = "about:blank"; 
        }, 300);
    }
</script>

</body>
</html>
