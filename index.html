<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Attendance</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .checkin {
      background: #22c55e;
      color: white;
    }

    .checkout {
      background: #ef4444;
      color: white;
    }

    button:hover {
      opacity: 0.85;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #38bdf8;
    }
    #close-btn {
    background-color: #d32f2f; /* Professional Red */
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: transform 0.2s;
}

  #close-btn:active {
      transform: scale(0.95); /* Makes it feel like a real button click */
}
    
  </style>
</head>

<body>

  <audio id="successSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

 <div class="container">
    <h1 id="greeting">Welcome</h1> 
    
    <p id="instruction">Tap below to record your time</p>

    <div id="button-group">
        <button class="checkin" onclick="sendAction('checkin')">
          ✅ Check In
        </button>

        <button class="checkout" onclick="sendAction('checkout')">
          ❌ Check Out
        </button>
    </div>

    <div class="status" id="status"></div>
   <button id="close-btn" style="display:none; margin-top: 20px; background-color: #333; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;" onclick="window.close();">
  🔴 Close & Exit
</button>
</div>

<script>
    // 1. GLOBAL VARIABLES
    const urlParams = new URLSearchParams(window.location.search);
    const staffId = urlParams.get('staffId');
    const action = urlParams.get('action');
    const webhookBase = "https://uyipraise.app.n8n.cloud/webhook/attendance";

    // 2. PAGE LOAD LOGIC
    window.onload = function() {
        if (staffId) {
            // Fetch the staff name
            fetch(`${webhookBase}?staffId=${staffId}&action=load`)
                .then(res => res.json())
                .then(data => {
                    if (data.display_name) {
                        document.getElementById("greeting").innerText = `Good day, ${data.display_name} 👋`;
                    }
                })
                .catch(err => console.log("Load error:", err));

            // Logic for Verification Mode (from Email)
            if (action === 'confirm') {
                document.getElementById("button-group").style.display = "none";
                document.getElementById("instruction").style.display = "none";
                document.getElementById("greeting").innerText = "Verification Mode";
                document.getElementById("status").innerText = "📍 Confirming your location...";

                navigator.geolocation.getCurrentPosition((position) => {
                    sendRequest('confirm', position.coords.latitude, position.coords.longitude);
                }, (error) => {
                    document.getElementById("status").innerText = "❌ Please enable GPS to verify.";
                });
            }
        } else {
            document.getElementById("greeting").innerText = "Welcome! (ID Missing)";
        }
    };

    // 3. MANUAL BUTTON TRIGGER
    function sendAction(actionType) {
        document.getElementById("successSound").load(); // Wake up audio
        document.getElementById("status").innerText = "Processing...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    sendRequest(actionType, position.coords.latitude, position.coords.longitude);
                },
                () => {
                    sendRequest(actionType, null, null); // Fallback if GPS fails
                }
            );
        } else {
            sendRequest(actionType, null, null);
        }
    }

    // 4. THE MAIN REQUEST FUNCTION
    function sendRequest(actionType, lat, lon) {
        let url = `${webhookBase}?staffId=${staffId}&action=${actionType}`;
        if (lat && lon) url += `&lat=${lat}&lon=${lon}`;

        fetch(url)
            .then(response => response.json())
            .then((data) => {
                const statusElement = document.getElementById("status");
                const closeBtn = document.getElementById("close-btn");
                const buttonGroup = document.getElementById("button-group");

                statusElement.innerText = data.message;

                // --- SUCCESS CHECK ---
                const isActuallySuccess = !data.message.includes("already checked in") && !data.message.includes("Error") && !data.message.includes("NOT AT WORKSTATION");

                if (isActuallySuccess) {
                    document.getElementById("instruction").innerText = "Success! You can now exit.";
                    statusElement.style.color = "#4BB543"; // Success Green
                    if (closeBtn) closeBtn.style.display = "inline-block";
                    if (buttonGroup) buttonGroup.style.display = "none";

                    // Haptics & Sound
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    const audio = document.getElementById("successSound");
                    if (audio) audio.play().catch(e => console.log("Audio blocked"));
                } else {
                    statusElement.style.color = "#ff4d4d"; // Error Red
                    statusElement.style.fontWeight = "bold";
                }
            })
            .catch((err) => {
                document.getElementById("status").innerText = "❌ Connection Error. Try again.";
                document.getElementById("status").style.color = "#ff4d4d";
            });
    }
</script>
  
</body>
</html>
