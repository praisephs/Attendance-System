<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Uyi Tech Attendance</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    h1 { margin-bottom: 5px; font-size: 24px; }
    p { color: #94a3b8; margin-bottom: 25px; font-size: 14px; }

    button {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .checkin { background: #22c55e; color: white; box-shadow: 0 4px 0 #16a34a; }
    .checkout { background: #ef4444; color: white; box-shadow: 0 4px 0 #dc2626; }
    
    button:active { transform: translateY(3px); box-shadow: none; }
    button:disabled { background: #475569; opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .status {
      margin-top: 20px;
      font-size: 16px;
      line-height: 1.4;
      transition: all 0.3s ease;
    }

    #close-btn {
      background-color: #334155;
      color: white;
      display: none; 
      margin-top: 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 id="greeting">Connecting...</h1> 
    <p id="instruction">Please wait while we verify your ID</p>

    <div id="button-group" style="display: none;">
        <button class="checkin" onclick="sendAction('checkin')">✅ Check In</button>
        <button class="checkout" onclick="sendAction('checkout')">❌ Check Out</button>
    </div>

    <div class="status" id="status"></div>
    
    <button id="close-btn" onclick="closeSystem()">Done & Exit</button>
  </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const staffId = urlParams.get('staffId');
    const webhookBase = "https://uyitechsolutions.com/webhook/prod";

    // 1. INITIAL LOAD
    window.onload = function() {
        if (!staffId) {
            document.getElementById("greeting").innerText = "Error";
            document.getElementById("instruction").innerText = "Staff ID is missing from URL.";
            return;
        }

        // Fetch name on load
        fetch(`${webhookBase}?staffId=${staffId}&action=load`)
            .then(res => res.json())
            .then(data => {
                if (data.Name) {
                    document.getElementById("greeting").innerText = `Hi, ${data.Name} 👋`;
                    document.getElementById("instruction").innerText = "Ready to log your attendance?";
                    document.getElementById("button-group").style.display = "block";
                } else {
                    document.getElementById("greeting").innerText = "Unknown ID";
                    document.getElementById("status").innerText = "Staff ID not recognized.";
                }
            })
            .catch(err => {
                document.getElementById("status").innerText = "Connection Error.";
                console.error(err);
            });
    };

    // 2. ACTION TRIGGER
    function sendAction(actionType) {
        const statusElement = document.getElementById("status");
        const btns = document.querySelectorAll('button');
        
        statusElement.innerText = "⏳ Verifying Location...";
        statusElement.style.background = "transparent";
        statusElement.style.color = "#38bdf8";
        
        // Disable buttons during processing
        btns.forEach(b => b.disabled = true);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    sendRequest(actionType, position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    statusElement.innerText = "📍 GPS Error: Please enable location services.";
                    btns.forEach(b => b.disabled = false);
                },
                { enableHighAccuracy: true }
            );
        } else {
            statusElement.innerText = "❌ Your browser doesn't support GPS.";
            btns.forEach(b => b.disabled = false);
        }
    }

    // 3. SEND TO N8N
    function sendRequest(actionType, lat, long) {
        let url = `${webhookBase}?staffId=${staffId}&action=${actionType}&lat=${lat}&long=${long}`;

        fetch(url)
            .then(response => response.json())
            .then((data) => {
                const statusElement = document.getElementById("status");
                const instructionElement = document.getElementById("instruction");
                const closeBtn = document.getElementById("close-btn");
                const buttonGroup = document.getElementById("button-group");

                statusElement.innerText = data.message;

                // Identify status based on emojis used in n8n
                const isSuccess = data.message.includes("✅");
                const isWarning = data.message.includes("⚠️");
                const isError = data.message.includes("❌");

                if (isSuccess) {
                    statusElement.style.color = "#ffffff";
                    statusElement.style.background = "#16a34a";
                    statusElement.style.padding = "15px";
                    statusElement.style.borderRadius = "12px";
                    buttonGroup.style.display = "none";
                    closeBtn.style.display = "block";
                } else if (isWarning) {
                    statusElement.style.color = "#ffffff";
                    statusElement.style.background = "#f59e0b";
                    statusElement.style.padding = "15px";
                    statusElement.style.borderRadius = "12px";
                    buttonGroup.style.display = "none";
                    closeBtn.style.display = "block";
                } else {
                    // It's a hard error (Too far away) - let them try again
                    statusElement.style.color = "#ffffff";
                    statusElement.style.background = "#ef4444";
                    statusElement.style.padding = "15px";
                    statusElement.style.borderRadius = "12px";
                    document.querySelectorAll('button').forEach(b => b.disabled = false);
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }
            })
            .catch((err) => {
                document.getElementById("status").innerText = "❌ System Timeout. Please try again.";
                document.querySelectorAll('button').forEach(b => b.disabled = false);
            });
    }

    function closeSystem() {
        window.close();
        setTimeout(() => { window.location.href = "about:blank"; }, 300);
    }
</script>
</body>
</html>
