<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Attendance</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .checkin {
      background: #22c55e;
      color: white;
    }

    .checkout {
      background: #ef4444;
      color: white;
    }

    button:hover {
      opacity: 0.85;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #38bdf8;
    }
  </style>
</head>

<body>

 <div class="container">
    <h1 id="greeting">Welcome</h1> 
    
    <p id="instruction">Tap below to record your time</p>

    <div id="button-group">
        <button class="checkin" onclick="sendAction('checkin')">
          ✅ Check In
        </button>

        <button class="checkout" onclick="sendAction('checkout')">
          ❌ Check Out
        </button>
    </div>

    <div class="status" id="status"></div>
</div>

  <script>
    const webhookBase = "https://uyipraise.app.n8n.cloud/webhook/attendance";

    // Get staffId from URL
    const urlParams = new URLSearchParams(window.location.search);
    const staffId = urlParams.get("staffId");

    // --- NEW: FETCH NAME ON PAGE LOAD ---
 window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const action = urlParams.get('action');
    const staffId = urlParams.get('staffId');

    if (staffId) {
        // 1. Always show the staff name
        fetch(`${webhookBase}?staffId=${staffId}&action=load`)
            .then(res => res.json())
            .then(data => {
                if (data.display_name) {
                    document.getElementById("greeting").innerText = `Good day, ${data.display_name} 👋`;
                }
            });

        // 2. If this is a scheduled verification link
        if (action === 'confirm') {
            // HIDE the buttons and the instruction text
            document.getElementById("button-group").style.display = "none";
            document.getElementById("instruction").style.display = "none";
            
            // Update the header to show they are in verification mode
            document.getElementById("greeting").innerText = "Verification Mode";
            document.getElementById("status").innerText = "📍 Confirming your location...";

            // Auto-trigger GPS
            navigator.geolocation.getCurrentPosition((position) => {
                sendRequest('confirm', position.coords.latitude, position.coords.longitude);
            }, (error) => {
                document.getElementById("status").innerText = "❌ Please enable GPS to verify.";
            });
        }
    }
};

    function sendAction(action) {
      if (!staffId) {
        document.getElementById("status").innerText = "Missing staff ID!";
        return;
      }

      document.getElementById("status").innerText = "Processing...";

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            sendRequest(action, position.coords.latitude, position.coords.longitude);
          },
          () => {
            sendRequest(action, null, null); // Proceed even if GPS fails
          }
        );
      } else {
        sendRequest(action, null, null);
      }
    }

function sendRequest(action, lat, lon) {
  let url = `${webhookBase}?staffId=${staffId}&action=${action}`;
  if (lat && lon) url += `&lat=${lat}&lon=${lon}`;

  document.getElementById("status").innerText = "Processing...";

  fetch(url)
    .then(response => response.json())
    .then((data) => {
      const statusElement = document.getElementById("status");
      statusElement.innerText = data.message;

      // The Checkmate Logic
      if (data.message.includes("NOT AT WORKSTATION")) {
        statusElement.style.color = "#ff4d4d"; // Scary Red
        statusElement.style.fontWeight = "bold";
      } else {
        statusElement.style.color = "#4BB543"; // Success Green
        statusElement.style.fontWeight = "normal";
      }
    })
    .catch((err) => {
      document.getElementById("status").innerText = "❌ Connection Error. Try again.";
      document.getElementById("status").style.color = "#ff4d4d";
    });
}
    
</script>

</body>
</html>
